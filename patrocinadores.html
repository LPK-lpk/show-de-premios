<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paróquia SCJM — Patrocinadores</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --font-sans:   'Montserrat', 'Segoe UI Rounded', sans-serif;
    --outline:     #111;
    --shadow-main: #ffc400;
    --shadow-alt:  #df2418;
    --shadow-soft: rgba(0,119,217,.55);
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #1a1a1a;
    color: #fff;
    font-family: var(--font-sans);
  }
  body { display: flex; align-items: stretch; justify-content: stretch; }

  /* ── Camadas de fundo com cross-fade ── */
  .bg-layer {
    position: fixed; inset: 0;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    transition: opacity 1.2s ease;
  }
  .layer-a { z-index: 0; opacity: 1; }
  .layer-b { z-index: 1; opacity: 0; }

  /* Overlay escuro para legibilidade */
  .bg-overlay {
    position: fixed; inset: 0; z-index: 2;
    background: rgba(0,0,0,.45);
    pointer-events: none;
  }

  /* ── Stage ── */
  .stage {
    position: relative; z-index: 3;
    width: 100vw; height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 7vh 7vw 6vh;
    isolation: isolate;
  }
  .stage::before {
    content: ''; position: absolute; inset: 0;
    background:
      linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px),
      linear-gradient(0deg,  rgba(255,255,255,.04) 1px, transparent 1px);
    background-size: 5vw 5vw;
    pointer-events: none;
  }
  .stage::after {
    content: ''; position: absolute; inset: 6vh 6vw;
    border-top:    1px solid rgba(255,255,255,.12);
    border-bottom: 1px solid rgba(255,255,255,.12);
    pointer-events: none;
  }

  /* ── Kicker ── */
  .kicker {
    position: relative; z-index: 1;
    font-size: clamp(14px, 2.1vh, 32px);
    letter-spacing: .2em; text-transform: uppercase;
    color: rgba(255,255,255,.65);
    margin-bottom: 2.5vh;
    font-weight: 800; user-select: none;
    text-shadow: 0 1px 6px rgba(0,0,0,.7);
  }

  /* ── Card ── */
  .sponsor-card {
    position: relative; z-index: 1;
    width: min(88vw, 1500px); min-height: 54vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; gap: 2.2vh;
  }

  .sp-name {
    max-width: 100%;
    font-size: clamp(52px, 10vh, 155px);
    line-height: .95; font-weight: 900; color: #fff;
    text-wrap: balance; letter-spacing: .01em;
    -webkit-text-stroke: clamp(2px,.5vh,8px) var(--outline);
    paint-order: stroke fill;
    text-shadow:
      .055em  .055em 0 var(--shadow-main),
      -.04em -.04em  0 var(--shadow-alt),
      .09em  -.035em 0 var(--shadow-soft),
      0 .08em 0 rgba(0,0,0,.6),
      0 .24em .28em rgba(0,0,0,.45);
  }
  .sp-phone {
    font-size: clamp(24px, 4.4vh, 68px);
    color: #fff; font-weight: 900;
    -webkit-text-stroke: clamp(1px,.22vh,4px) var(--outline);
    paint-order: stroke fill;
    text-shadow:
      .055em  .055em 0 var(--shadow-alt),
      -.038em -.038em 0 var(--shadow-main),
      .078em  -.028em 0 var(--shadow-soft),
      0 .14em .22em rgba(0,0,0,.4);
  }
  .sp-msg {
    max-width: 82vw;
    font-size: clamp(22px, 4vh, 64px);
    color: #fff; line-height: 1.15; font-weight: 900;
    text-wrap: balance;
    -webkit-text-stroke: clamp(1px,.2vh,4px) var(--outline);
    paint-order: stroke fill;
    text-shadow:
      .052em  .052em 0 var(--shadow-main),
      -.034em -.034em 0 var(--shadow-alt),
      .074em  -.026em 0 var(--shadow-soft),
      0 .13em .2em rgba(0,0,0,.38);
  }

  /* ── Badge de pedra ── */
  .num-badge {
    position: absolute; top: 7vh; left: 6vw; z-index: 4;
    font-size: clamp(13px,2.5vh,28px); font-weight: 900;
    color: rgba(255,255,255,.4);
    user-select: none;
    text-shadow: 0 1px 4px rgba(0,0,0,.6);
  }

  /* ── Assinatura ── */
  .parish {
    position: absolute; right: 6vw; bottom: 7vh; z-index: 4;
    font-size: clamp(13px,1.9vh,26px);
    color: rgba(255,255,255,.6);
    text-align: right; font-weight: 800; line-height: 1.4;
    text-shadow: 0 1px 6px rgba(0,0,0,.7);
    display: flex; align-items: center; gap: 10px; justify-content: flex-end;
  }
  .parish img {
    height: 6.5vh; width: auto; object-fit: contain;
    opacity: .85; filter: drop-shadow(0 2px 6px rgba(0,0,0,.6));
  }

  /* ── Indicador de fundo ── */
  .bg-indicator {
    position: absolute; left: 6vw; bottom: 7.5vh; z-index: 4;
    font-size: clamp(10px,1.4vh,16px); font-weight: 700;
    color: rgba(255,255,255,.22); user-select: none;
  }

  /* ── Barra de progresso ── */
  .progress {
    position: fixed; left: 0; right: 0; bottom: 0; height: 7px;
    background: rgba(255,255,255,.08); z-index: 10;
  }
  .progress-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--shadow-main), var(--shadow-alt));
    transition: width .25s linear;
  }

  /* ── Status ── */
  .status-msg {
    color: rgba(255,255,255,.8);
    font-size: clamp(20px,3.5vh,52px);
    font-weight: 800; text-align: center; line-height: 1.4;
    text-shadow: 0 2px 8px rgba(0,0,0,.7);
  }

  /* ── Animações ── */
  .sponsor-card.fx-rise  { animation: fx-rise  .82s cubic-bezier(.18,.9,.22,1) both; }
  .sponsor-card.fx-zoom  { animation: fx-zoom  .84s cubic-bezier(.18,.9,.22,1) both; }
  .sponsor-card.fx-left  { animation: fx-left  .84s cubic-bezier(.18,.9,.22,1) both; }
  .sponsor-card.fx-right { animation: fx-right .84s cubic-bezier(.18,.9,.22,1) both; }
  .sponsor-card.fx-tilt  { animation: fx-tilt  .88s cubic-bezier(.18,.9,.22,1) both; }
  .sponsor-card.fx-blur  { animation: fx-blur  .88s cubic-bezier(.18,.9,.22,1) both; }
  .sponsor-card.exiting  { animation: fx-exit  .50s cubic-bezier(.55,0,.7,.2)  both; }

  @keyframes fx-rise  { from{opacity:0;transform:translateY(8vh) scale(.96);filter:blur(8px)}   to{opacity:1;transform:none;filter:none} }
  @keyframes fx-zoom  { from{opacity:0;transform:scale(.72);filter:blur(10px)}                   to{opacity:1;transform:none;filter:none} }
  @keyframes fx-left  { from{opacity:0;transform:translateX(-12vw) rotate(-2deg);filter:blur(8px)} to{opacity:1;transform:none;filter:none} }
  @keyframes fx-right { from{opacity:0;transform:translateX(12vw) rotate(2deg);filter:blur(8px)}   to{opacity:1;transform:none;filter:none} }
  @keyframes fx-tilt  { from{opacity:0;transform:perspective(900px) rotateX(16deg) translateY(-4vh) scale(.94);filter:blur(8px)} to{opacity:1;transform:none;filter:none} }
  @keyframes fx-blur  { from{opacity:0;transform:scale(1.12);filter:blur(16px)}                  to{opacity:1;transform:none;filter:none} }
  @keyframes fx-exit  { from{opacity:1;transform:none;filter:none} to{opacity:0;transform:translateY(-7vh) scale(.96);filter:blur(10px)} }
</style>
</head>
<body>

<div class="bg-layer layer-a" id="bgA"></div>
<div class="bg-layer layer-b" id="bgB"></div>
<div class="bg-overlay"></div>

<main class="stage">
  <div class="num-badge"  id="numBadge"></div>
  <div class="kicker">✦ Patrocinador ✦</div>

  <section class="sponsor-card" id="card">
    <div class="status-msg" id="statusMsg">Carregando patrocinadores…</div>
    <div class="sp-name"  id="spName"  style="display:none"></div>
    <div class="sp-phone" id="spPhone" style="display:none"></div>
    <div class="sp-msg"   id="spMsg"   style="display:none"></div>
  </section>

  <div class="parish">
    <img src="imagens/brasao.png" onerror="this.style.display='none'" alt="">
    <span>Paróquia Sagrado Coração de Jesus<br>Marília — SP</span>
  </div>

  <div class="bg-indicator" id="bgIndicator"></div>
</main>

<div class="progress"><div class="progress-fill" id="progFill"></div></div>

<script>
/* ══════════════════════════════════════════════════════════════════
   CONFIGURAÇÕES
══════════════════════════════════════════════════════════════════ */
var CFG = {
  SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbyxYWSmr0zHOczqaUg7yoemsXrCDN9mW6WNQJi61IqOSBpBjm9QnB4k6mjwetCj5FYK/exec',
  SLIDE_MS:   10000,   // ms por patrocinador
  BG_MS:      60000,   // ms por fundo
  RELOAD_MS:  300000   // recarrega patrocinadores a cada 5 min
};

/* ── Fundos locais (caminhos relativos no GitHub Pages) ──
   Adicione ou remova entradas conforme as imagens do repositório.   */
var FUNDOS_LOCAL = [
  { caminho: 'imagens/fundos/fundo_luzes.webp',  nome: 'Luzes'     },
  { caminho: 'imagens/fundos/aparecida.webp',    nome: 'Aparecida' },
  { caminho: 'imagens/fundos/matriz.webp',       nome: 'Matriz'    },
  { caminho: 'imagens/fundos/obra.webp',         nome: 'Obra'      },
  { caminho: 'imagens/fundos/santo_espedito.webp', nome: 'Espedito' }
];

/* ── Temas de cores ── */
var THEMES = [
  { main:'#ffc400', alt:'#df2418', soft:'rgba(0,119,217,.62)'  },
  { main:'#0077d9', alt:'#ffc400', soft:'rgba(223,36,24,.58)'  },
  { main:'#df2418', alt:'#0077d9', soft:'rgba(255,196,0,.66)'  },
  { main:'#ffc400', alt:'#0077d9', soft:'rgba(223,36,24,.58)'  },
  { main:'#0077d9', alt:'#df2418', soft:'rgba(255,196,0,.66)'  },
  { main:'#df2418', alt:'#ffc400', soft:'rgba(0,119,217,.62)'  }
];
var FX = ['fx-rise','fx-zoom','fx-left','fx-right','fx-tilt','fx-blur'];

/* ══════════════════════════════════════════════════════════════════
   ESTADO
══════════════════════════════════════════════════════════════════ */
var state = {
  pats:       [],
  fundos:     [],
  patIdx:     0,
  bgIdx:      0,
  activeBg:   'A',
  slideStart: Date.now(),
  t: { slide:null, prog:null, exit:null, bg:null, reload:null }
};

/* ── DOM ── */
var el = {
  bgA:    document.getElementById('bgA'),
  bgB:    document.getElementById('bgB'),
  bgInd:  document.getElementById('bgIndicator'),
  badge:  document.getElementById('numBadge'),
  card:   document.getElementById('card'),
  status: document.getElementById('statusMsg'),
  name:   document.getElementById('spName'),
  phone:  document.getElementById('spPhone'),
  msg:    document.getElementById('spMsg'),
  prog:   document.getElementById('progFill')
};

/* ══════════════════════════════════════════════════════════════════
   UTILITÁRIOS
══════════════════════════════════════════════════════════════════ */

/* JSONP — necessário no GitHub Pages (sem CORS) */
function jsonp(url, cb) {
  var id  = '_cb' + Date.now();
  var tag = document.createElement('script');
  window[id] = function(data) {
    try { delete window[id]; } catch(e) { window[id] = void 0; }
    tag.parentNode && tag.parentNode.removeChild(tag);
    cb(null, data);
  };
  tag.onerror = function() {
    try { delete window[id]; } catch(e) { window[id] = void 0; }
    tag.parentNode && tag.parentNode.removeChild(tag);
    cb(new Error('net'));
  };
  tag.src = url + '&callback=' + id + '&_=' + Date.now();
  document.head.appendChild(tag);
}

/* Testa se uma URL de imagem carrega; chama cb(true/false) */
function testImg(src, cb) {
  var img = new Image();
  img.onload  = function() { cb(true);  };
  img.onerror = function() { cb(false); };
  img.src = src;
}

/* ══════════════════════════════════════════════════════════════════
   FUNDOS
══════════════════════════════════════════════════════════════════ */

/* Cross-fade para um novo fundo */
function applyBg(src, nome) {
  var inEl  = state.activeBg === 'A' ? el.bgB : el.bgA;
  var outEl = state.activeBg === 'A' ? el.bgA : el.bgB;

  inEl.style.zIndex = 1;
  outEl.style.zIndex = 0;
  inEl.style.backgroundImage = 'url("' + src + '")';
  inEl.style.opacity = 0;
  void inEl.offsetWidth;
  inEl.style.transition  = 'opacity 1.2s ease';
  outEl.style.transition = 'opacity 1.2s ease';
  inEl.style.opacity  = 1;
  outEl.style.opacity = 0;

  state.activeBg = state.activeBg === 'A' ? 'B' : 'A';
  el.bgInd.textContent = nome ? '🖼 ' + nome : '';
}

/* Avança para o próximo fundo da lista */
function nextBg() {
  if (!state.fundos.length) return;
  state.bgIdx = (state.bgIdx + 1) % state.fundos.length;
  var f = state.fundos[state.bgIdx];
  applyBg(f.caminho, f.nome);
}

/* Inicia ciclo automático de fundos */
function startBgCycle() {
  clearInterval(state.t.bg);
  if (state.fundos.length > 1)
    state.t.bg = setInterval(nextBg, CFG.BG_MS);
}

/*
  Tenta carregar fundos pela API. Se a API não retornar fundos válidos,
  usa os caminhos locais definidos em FUNDOS_LOCAL,
  filtrando apenas as imagens que realmente existem no servidor.
*/
function loadFundos() {
  jsonp(CFG.SCRIPT_URL + '?acao=listarFundos', function(err, data) {
    var lista = [];

    if (!err && data && data.sucesso) {
      /* Tenta extrair a lista de múltiplos formatos possíveis */
      if      (data.dados && Array.isArray(data.dados.fundos))  lista = data.dados.fundos;
      else if (data.dados && Array.isArray(data.dados))         lista = data.dados;
      else if (Array.isArray(data.fundos))                      lista = data.fundos;
    }

    if (lista.length) {
      /* API retornou fundos — normaliza o campo de caminho */
      state.fundos = lista.map(function(f) {
        return { caminho: f.url || f.caminho || f.path || '', nome: f.nome || f.name || '' };
      }).filter(function(f) { return f.caminho; });
    }

    if (!state.fundos.length) {
      /* Fallback: usa lista local, testa cada imagem antes de usar */
      var valid = [];
      var total = FUNDOS_LOCAL.length;
      var done  = 0;
      FUNDOS_LOCAL.forEach(function(f) {
        testImg(f.caminho, function(ok) {
          if (ok) valid.push(f);
          done++;
          if (done === total) {
            if (valid.length) {
              state.fundos = valid;
              applyBg(state.fundos[0].caminho, state.fundos[0].nome);
              startBgCycle();
            }
            /* Se nenhuma imagem carregou, fundo fica preto — sem erro */
          }
        });
      });
      return; /* sai aqui — applyBg será chamado dentro do testImg */
    }

    /* API retornou fundos válidos */
    applyBg(state.fundos[0].caminho, state.fundos[0].nome);
    startBgCycle();
  });
}

/* ══════════════════════════════════════════════════════════════════
   PATROCINADORES
══════════════════════════════════════════════════════════════════ */

function applyTheme(i) {
  var t = THEMES[i % THEMES.length];
  var r = document.documentElement;
  r.style.setProperty('--shadow-main', t.main);
  r.style.setProperty('--shadow-alt',  t.alt);
  r.style.setProperty('--shadow-soft', t.soft);
}

function showStatus(msg) {
  el.badge.textContent    = '';
  el.status.style.display = '';
  el.status.textContent   = msg;
  el.name.style.display   = 'none';
  el.phone.style.display  = 'none';
  el.msg.style.display    = 'none';
  el.prog.style.width     = '0%';
}

function render() {
  if (!state.pats.length) { showStatus('Aguardando patrocinadores…'); return; }
  if (state.patIdx >= state.pats.length) state.patIdx = 0;

  var sp = state.pats[state.patIdx];
  applyTheme(state.patIdx);

  FX.forEach(function(f) { el.card.classList.remove(f); });
  el.card.classList.remove('exiting');
  void el.card.offsetWidth;
  el.card.classList.add(FX[state.patIdx % FX.length]);

  el.badge.textContent = String(sp.num) === '0' ? 'Coringa' : 'Pedra ' + sp.num;

  el.status.style.display = 'none';

  /* Compatível com campos em inglês (name/phone/msg) e português (nome/fone/mensagem) */
  el.name.textContent  = sp.name  || sp.nome       || '';
  el.phone.textContent = sp.phone || sp.fone        || '';
  el.msg.textContent   = sp.msg   || sp.mensagem    || '';

  el.name.style.display  = el.name.textContent  ? '' : 'none';
  el.phone.style.display = el.phone.textContent ? '' : 'none';
  el.msg.style.display   = el.msg.textContent   ? '' : 'none';

  state.slideStart = Date.now();
  el.prog.style.width = '0%';
}

function advance(delta) {
  if (!state.pats.length) return;
  FX.forEach(function(f) { el.card.classList.remove(f); });
  el.card.classList.add('exiting');
  clearTimeout(state.t.exit);
  state.t.exit = setTimeout(function() {
    state.patIdx = (state.patIdx + delta + state.pats.length) % state.pats.length;
    render();
  }, 500);
}

function startLoop() {
  clearInterval(state.t.slide);
  clearInterval(state.t.prog);
  clearTimeout(state.t.exit);
  render();
  if (state.pats.length > 1) {
    state.t.slide = setInterval(function() { advance(1); }, CFG.SLIDE_MS);
    state.t.prog  = setInterval(function() {
      var pct = Math.min(100, (Date.now() - state.slideStart) / CFG.SLIDE_MS * 100);
      el.prog.style.width = pct + '%';
    }, 200);
  }
}

function loadPats() {
  jsonp(CFG.SCRIPT_URL + '?acao=listarPatrocinios', function(err, data) {
    if (err || !data || !data.sucesso) {
      showStatus('Erro ao carregar. Tentando em 30s…');
      setTimeout(loadPats, 30000);
      return;
    }

    /* ── Extrai a lista — suporta todos os formatos conhecidos ── */
    var lista = [];
    if      (data.dados && Array.isArray(data.dados.patrocinadores)) lista = data.dados.patrocinadores;
    else if (data.dados && Array.isArray(data.dados.patrocinios))    lista = data.dados.patrocinios;
    else if (data.dados && Array.isArray(data.dados))                lista = data.dados;
    else if (Array.isArray(data.patrocinios))                        lista = data.patrocinios;  /* formato atual */
    else if (Array.isArray(data.patrocinadores))                     lista = data.patrocinadores;

    if (!lista.length) { showStatus('Nenhum patrocinador encontrado.'); return; }

    var curNum = state.pats[state.patIdx] && state.pats[state.patIdx].num;
    state.pats = lista;
    var same = lista.findIndex(function(r) { return r.num === curNum; });
    state.patIdx = same >= 0 ? same : 0;
    startLoop();
  });
}

/* ══════════════════════════════════════════════════════════════════
   BROADCASTCHANNEL
══════════════════════════════════════════════════════════════════ */
try {
  var ch = new BroadcastChannel('bingo-canal');
  ch.onmessage = function(e) {
    var d = e && e.data;
    if (!d) return;
    if (d.tipo === 'sponsors' && Array.isArray(d.payload) && d.payload.length) {
      var v = d.payload.filter(function(r) { return r && r.name; });
      if (v.length) { state.pats = v; state.patIdx = 0; startLoop(); }
    }
    if (d.tipo === 'fundos' && Array.isArray(d.payload) && d.payload.length) {
      state.fundos = d.payload; state.bgIdx = 0;
      applyBg(state.fundos[0].caminho || state.fundos[0].url, state.fundos[0].nome);
      startBgCycle();
    }
  };
} catch(ignore) {}

/* ══════════════════════════════════════════════════════════════════
   TECLADO
══════════════════════════════════════════════════════════════════ */
document.addEventListener('keydown', function(e) {
  switch(e.key) {
    case 'f': case 'F':
      if (!document.fullscreenElement)
        document.documentElement.requestFullscreen().catch(function(){});
      break;
    case 'ArrowRight':
      clearInterval(state.t.slide); advance(1);  break;
    case 'ArrowLeft':
      clearInterval(state.t.slide); advance(-1); break;
    case 'ArrowUp':
      if (state.fundos.length > 1) nextBg();     break;
  }
});

/* ══════════════════════════════════════════════════════════════════
   RECARGA PERIÓDICA & INICIALIZAÇÃO
══════════════════════════════════════════════════════════════════ */
state.t.reload = setInterval(loadPats, CFG.RELOAD_MS);

loadFundos();
loadPats();
</script>
</body>
</html>
