<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Paróquia SCJM — Patrocinadores</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --font-sans: 'Montserrat', 'Segoe UI Rounded', sans-serif;
    --outline: #111;
    --shadow-main: #ffc400;
    --shadow-alt: #df2418;
    --shadow-soft: rgba(0,119,217,.55);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #fff; color: #fff; font-family: var(--font-sans);
  }
  body { display: flex; align-items: stretch; justify-content: stretch; }

  .stage {
    position: relative; width: 100vw; height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 7vh 7vw 6vh; isolation: isolate; background: #fff;
  }
  .stage::before {
    content: ''; position: absolute; inset: 0;
    background:
      linear-gradient(90deg, rgba(0,0,0,.035) 1px, transparent 1px),
      linear-gradient(0deg,  rgba(0,0,0,.035) 1px, transparent 1px);
    background-size: 5vw 5vw; pointer-events: none;
  }
  .stage::after {
    content: ''; position: absolute; inset: 6vh 6vw;
    border-top: 1px solid rgba(0,0,0,.08);
    border-bottom: 1px solid rgba(0,0,0,.08);
    pointer-events: none;
  }

  .kicker {
    font-size: clamp(18px, 2.3vh, 34px);
    letter-spacing: .18em; text-transform: uppercase;
    color: rgba(0,0,0,.22); margin-bottom: 3vh; font-weight: 800;
    user-select: none;
  }

  .sponsor-card {
    width: min(88vw, 1500px); min-height: 54vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; gap: 2.3vh;
  }

  .name {
    max-width: 100%;
    font-size: clamp(60px, 11vh, 160px);
    line-height: .95; font-weight: 900; color: #fff;
    text-wrap: balance; letter-spacing: .01em;
    -webkit-text-stroke: clamp(2px, .5vh, 8px) var(--outline);
    paint-order: stroke fill;
    text-shadow:
      .055em .055em 0 var(--shadow-main),
      -.04em -.04em 0 var(--shadow-alt),
      .09em -.035em 0 var(--shadow-soft),
      0 .08em 0 rgba(0,0,0,.42),
      0 .24em .28em rgba(0,0,0,.32);
  }
  .phone {
    font-size: clamp(28px, 4.8vh, 72px);
    color: #fff; font-weight: 900;
    -webkit-text-stroke: clamp(1px, .22vh, 4px) var(--outline);
    paint-order: stroke fill;
    text-shadow:
      .055em .055em 0 var(--shadow-alt),
      -.038em -.038em 0 var(--shadow-main),
      .078em -.028em 0 var(--shadow-soft),
      0 .14em .22em rgba(0,0,0,.28);
  }
  .msg {
    max-width: 82vw;
    font-size: clamp(26px, 4.4vh, 68px);
    color: #fff; line-height: 1.15; font-weight: 900;
    text-wrap: balance;
    -webkit-text-stroke: clamp(1px, .2vh, 4px) var(--outline);
    paint-order: stroke fill;
    text-shadow:
      .052em .052em 0 var(--shadow-main),
      -.034em -.034em 0 var(--shadow-alt),
      .074em -.026em 0 var(--shadow-soft),
      0 .13em .2em rgba(0,0,0,.26);
  }
  .num-badge {
    position: absolute; top: 7vh; left: 6vw;
    font-size: 2.8vh; font-weight: 900;
    color: rgba(0,0,0,.13); -webkit-text-stroke: 1px rgba(0,0,0,.08);
  }

  .parish {
    position: absolute; right: 6vw; bottom: 7vh;
    font-size: clamp(16px, 2.2vh, 30px);
    color: rgba(0,0,0,.18); text-align: right; font-weight: 800; line-height: 1.4;
  }

  .progress {
    position: fixed; left: 0; right: 0; bottom: 0; height: 8px;
    background: rgba(0,0,0,.045);
  }
  .progress-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--shadow-main), var(--shadow-alt));
    transition: width .25s linear;
  }

  .status-msg {
    color: #555; font-size: clamp(24px, 4vh, 60px); font-weight: 800;
    text-align: center; line-height: 1.4;
  }

  /* Animações de entrada */
  .sponsor-card.fx-rise  { animation: rise  .80s cubic-bezier(.18,.9,.22,1) both; }
  .sponsor-card.fx-zoom  { animation: zoom  .82s cubic-bezier(.18,.9,.22,1) both; }
  .sponsor-card.fx-left  { animation: left  .82s cubic-bezier(.18,.9,.22,1) both; }
  .sponsor-card.fx-right { animation: right .82s cubic-bezier(.18,.9,.22,1) both; }
  .sponsor-card.fx-tilt  { animation: tilt  .86s cubic-bezier(.18,.9,.22,1) both; }
  .sponsor-card.fx-blur  { animation: blur  .86s cubic-bezier(.18,.9,.22,1) both; }
  .sponsor-card.exiting  { animation: exit  .50s cubic-bezier(.55,0,.7,.2)  both; }

  @keyframes rise  { from{opacity:0;transform:translateY(8vh) scale(.96);filter:blur(8px)}  to{opacity:1;transform:none;filter:none} }
  @keyframes zoom  { from{opacity:0;transform:scale(.74);filter:blur(10px)}                  to{opacity:1;transform:none;filter:none} }
  @keyframes left  { from{opacity:0;transform:translateX(-12vw) rotate(-2deg);filter:blur(8px)} to{opacity:1;transform:none;filter:none} }
  @keyframes right { from{opacity:0;transform:translateX(12vw)  rotate( 2deg);filter:blur(8px)} to{opacity:1;transform:none;filter:none} }
  @keyframes tilt  { from{opacity:0;transform:perspective(900px) rotateX(16deg) translateY(-4vh) scale(.94);filter:blur(8px)} to{opacity:1;transform:none;filter:none} }
  @keyframes blur  { from{opacity:0;transform:scale(1.12);filter:blur(16px)}                 to{opacity:1;transform:none;filter:none} }
  @keyframes exit  { from{opacity:1;transform:none;filter:none} to{opacity:0;transform:translateY(-7vh) scale(.96);filter:blur(10px)} }
</style>
</head>
<body>
<main class="stage">
  <div class="num-badge" id="numBadge"></div>
  <div class="kicker">✦ Patrocinador ✦</div>

  <section class="sponsor-card" id="card">
    <div class="status-msg" id="statusMsg">Carregando patrocinadores...</div>
    <div class="name"  id="spName"  style="display:none"></div>
    <div class="phone" id="spPhone" style="display:none"></div>
    <div class="msg"   id="spMsg"   style="display:none"></div>
  </section>

  <div class="parish">Paróquia Sagrado Coração de Jesus<br>Marília — SP</div>
  <div class="progress"><div class="progress-fill" id="progFill"></div></div>
</main>

<script>
  var SCRIPT_URL  = 'https://script.google.com/macros/s/AKfycbyxYWSmr0zHOczqaUg7yoemsXrCDN9mW6WNQJi61IqOSBpBjm9QnB4k6mjwetCj5FYK/exec';
  var SLIDE_MS    = 18000;   // tempo por slide (ms)
  var RELOAD_MS   = 300000;  // recarrega da planilha a cada 5 min

  var THEMES = [
    { main:'#ffc400', alt:'#df2418', soft:'rgba(0,119,217,.62)' },
    { main:'#0077d9', alt:'#ffc400', soft:'rgba(223,36,24,.58)' },
    { main:'#df2418', alt:'#0077d9', soft:'rgba(255,196,0,.66)' },
    { main:'#ffc400', alt:'#0077d9', soft:'rgba(223,36,24,.58)' },
    { main:'#0077d9', alt:'#df2418', soft:'rgba(255,196,0,.66)' },
    { main:'#df2418', alt:'#ffc400', soft:'rgba(0,119,217,.62)' },
  ];
  var FX = ['fx-rise','fx-zoom','fx-left','fx-right','fx-tilt','fx-blur'];

  var rows          = [];
  var index         = 0;
  var slideTimer    = null;
  var progTimer     = null;
  var exitTimer     = null;
  var slideStart    = Date.now();

  /* ── Busca dados da planilha ── */
  function carregarPatrocinios() {
    var url = SCRIPT_URL + '?acao=listarPatrocinios&_=' + Date.now();
    fetch(url)
      .then(function(r){ return r.json(); })
      .then(function(data) {
        if (data.sucesso && Array.isArray(data.patrocinios) && data.patrocinios.length) {
          var currentNum = rows[index] && rows[index].num;
          rows = data.patrocinios;
          var sameIdx = rows.findIndex(function(r){ return r.num === currentNum; });
          index = sameIdx >= 0 ? sameIdx : 0;
          iniciarLoop();
        } else {
          mostrarStatus('Nenhum patrocinador encontrado na planilha.');
        }
      })
      .catch(function(err) {
        mostrarStatus('Erro ao carregar patrocinadores.\nTentando novamente em 30s...');
        setTimeout(carregarPatrocinios, 30000);
      });
  }

  /* ── Tela de status ── */
  function mostrarStatus(msg) {
    document.getElementById('numBadge').textContent = '';
    document.getElementById('statusMsg').style.display = '';
    document.getElementById('statusMsg').textContent   = msg;
    document.getElementById('spName').style.display  = 'none';
    document.getElementById('spPhone').style.display = 'none';
    document.getElementById('spMsg').style.display   = 'none';
    document.getElementById('progFill').style.width  = '0%';
  }

  /* ── Aplica tema de cores ── */
  function aplicarTema(i) {
    var t = THEMES[i % THEMES.length];
    document.documentElement.style.setProperty('--shadow-main', t.main);
    document.documentElement.style.setProperty('--shadow-alt',  t.alt);
    document.documentElement.style.setProperty('--shadow-soft', t.soft);
  }

  /* ── Renderiza patrocinador atual ── */
  function renderizar() {
    if (!rows.length) { mostrarStatus('Aguardando patrocinadores...'); return; }
    if (index >= rows.length) index = 0;

    var sp = rows[index];
    aplicarTema(index);

    var card = document.getElementById('card');
    card.classList.remove('exiting');
    FX.forEach(function(f){ card.classList.remove(f); });
    void card.offsetWidth; // força reflow para reiniciar animação
    card.classList.add(FX[index % FX.length]);

    // número da pedra
    var numLabel = String(sp.num) === '0' ? 'Coringa' : 'Pedra ' + sp.num;
    document.getElementById('numBadge').textContent = numLabel;

    // conteúdo
    document.getElementById('statusMsg').style.display = 'none';

    var nameEl  = document.getElementById('spName');
    var phoneEl = document.getElementById('spPhone');
    var msgEl   = document.getElementById('spMsg');

    nameEl.textContent  = sp.name  || '';
    phoneEl.textContent = sp.phone || '';
    msgEl.textContent   = sp.msg   || '';

    nameEl.style.display  = sp.name  ? '' : 'none';
    phoneEl.style.display = sp.phone ? '' : 'none';
    msgEl.style.display   = sp.msg   ? '' : 'none';

    // progress bar
    slideStart = Date.now();
    document.getElementById('progFill').style.width = '0%';
  }

  /* ── Avança slide com animação de saída ── */
  function avancar(delta) {
    if (!rows.length) return;
    var card = document.getElementById('card');
    FX.forEach(function(f){ card.classList.remove(f); });
    card.classList.add('exiting');
    clearTimeout(exitTimer);
    exitTimer = setTimeout(function() {
      index = (index + delta + rows.length) % rows.length;
      renderizar();
    }, 500);
  }

  /* ── Inicia loop automático ── */
  function iniciarLoop() {
    clearInterval(slideTimer);
    clearInterval(progTimer);
    clearTimeout(exitTimer);
    renderizar();
    if (rows.length > 1) {
      slideTimer = setInterval(function(){ avancar(1); }, SLIDE_MS);
      progTimer  = setInterval(function(){
        var pct = Math.min(100, ((Date.now() - slideStart) / SLIDE_MS) * 100);
        document.getElementById('progFill').style.width = pct + '%';
      }, 200);
    }
  }

  /* ── BroadcastChannel (recebe do painel se aberto) ── */
  var canal = new BroadcastChannel('bingo-canal');
  canal.onmessage = function(e) {
    var d = e.data;
    if (!d) return;
    if (d.tipo === 'sponsors' && Array.isArray(d.payload) && d.payload.length) {
      rows  = d.payload.filter(function(r){ return r && r.name; });
      index = 0;
      iniciarLoop();
    }
  };

  /* ── Teclado ── */
  document.addEventListener('keydown', function(e) {
    if (e.key === 'f' || e.key === 'F') {
      if (!document.fullscreenElement)
        document.documentElement.requestFullscreen().catch(function(){});
    }
    if (e.key === 'ArrowRight') { clearInterval(slideTimer); avancar(1); }
    if (e.key === 'ArrowLeft')  { clearInterval(slideTimer); avancar(-1); }
  });

  /* ── Recarga periódica da planilha ── */
  setInterval(carregarPatrocinios, RELOAD_MS);

  /* ── Início ── */
  carregarPatrocinios();
</script>
</body>
</html>
