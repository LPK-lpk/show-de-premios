<!DOCTYPE html>
<!-- entrevista.html — Show de Prêmios
     Tela dedicada para exibir uma entrevista/videochamada ao vivo (Jitsi Meet),
     separada do datashow.html (que continua só com o sorteio de números).
     Controlada pelo painel via BroadcastChannel, mesmo padrão de video.html. -->
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrevista ao Vivo — Show de Prêmios</title>
<!-- Firebase (permite abrir esta tela em outro aparelho/rede e continuar
     sincronizada com o painel em tempo real) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }

  /* ── Tela de espera ── */
  .espera {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 3vh;
    background: #000;
    transition: opacity .6s ease;
  }
  .espera.oculta { opacity: 0; pointer-events: none; }
  .espera-logo { font-size: 8vh; }
  .espera-titulo {
    font-size: clamp(18px, 3.5vh, 48px);
    font-weight: 700; color: #fff; text-align: center;
    text-shadow: 0 2px 12px rgba(0,0,0,.6);
  }
  .espera-sub { font-size: clamp(12px, 2vh, 24px); color: #555; }

  /* ── Chamada ao vivo ── */
  #call-wrap {
    position: fixed; inset: 0; z-index: 5;
    background: #000; display: none;
  }
  #call-wrap.show { display: block; }
  #call-frame { width: 100%; height: 100%; border: none; }
</style>
</head>
<body>

<!-- Tela de espera -->
<div class="espera" id="espera">
  <div class="espera-logo">🎤</div>
  <div class="espera-titulo">Aguardando entrevista…</div>
  <div class="espera-sub">O operador iniciará a chamada pelo painel</div>
</div>

<!-- Videochamada (Jitsi Meet) -->
<div id="call-wrap">
  <iframe id="call-frame"
    allow="camera; microphone; fullscreen; display-capture; autoplay; speaker-selection"
    allowfullscreen></iframe>
</div>

<script>
var CANAL_NOME = 'bingo-canal';

/* ── BroadcastChannel ── */
  function processarMensagemEntrevista(d) {
    if (!d) return;
    if (d.tipo === 'trocar_tela') {
      var alvo = d.payload && d.payload.arquivo;
      var atual = location.pathname.split('/').pop() || 'index.html';
      if (alvo && alvo !== atual) location.href = alvo;
      return;
    }

  if (d.tipo === 'mostrar_entrevista') {
    mostrarEntrevista(d.payload && d.payload.sala);
  }
  if (d.tipo === 'ocultar_entrevista') {
    ocultarEntrevista();
  }
}

try {
  var canal = new BroadcastChannel(CANAL_NOME);
  canal.onmessage = function(e) {
    processarMensagemEntrevista(e && e.data);
  };
} catch(err) {
  console.warn('BroadcastChannel indisponível');
}

/* Firebase — sincronização entre aparelhos diferentes (ex.: esta tela
   aberta num monitor de outra sala). É um "extra" ao lado do
   BroadcastChannel; se falhar, a sincronização no mesmo computador
   continua funcionando normalmente. */
try {
  var firebaseConfig = {
    apiKey: "AIzaSyBPkvhBHOfZOzEqlukWgHRJnoDeYFrtj0I",
    authDomain: "show-de-premios-scj.firebaseapp.com",
    databaseURL: "https://show-de-premios-scj-default-rtdb.firebaseio.com",
    projectId: "show-de-premios-scj",
    storageBucket: "show-de-premios-scj.firebasestorage.app",
    messagingSenderId: "869902837867",
    appId: "1:869902837867:web:d690f79e6f916da672a92e"
  };
  firebase.initializeApp(firebaseConfig);
  firebase.auth().signInAnonymously().catch(function(e){
    console.warn('Falha no login anônimo do Firebase:', e);
  });
  var _fbJaConfigurado = false;
  firebase.auth().onAuthStateChanged(function(user){
    if (!user || _fbJaConfigurado) return;
    _fbJaConfigurado = true;
    var _fbUltimoTsEntrevista = null;
    firebase.database().ref('bingo/ultimaMensagem').on('value', function(snap) {
      var d = snap.val();
      if (!d || d.ts === _fbUltimoTsEntrevista) return;
      _fbUltimoTsEntrevista = d.ts;
      processarMensagemEntrevista(d);
    });
  });
} catch(e) {
  console.warn('Firebase indisponível — esta tela só sincroniza com abas do mesmo computador.', e);
}

/* ── Entrar na sala Jitsi ──
   "sala" é só o nome da sala (sem espaços/acentos) — o mesmo nome que
   a pessoa remota usa para entrar em meet.jit.si/<sala>. Esta tela
   entra sem câmera/microfone próprios (só recebe e mostra o vídeo da
   pessoa remota), evitando eco/microfonia com as caixas de som do salão. */
function mostrarEntrevista(sala) {
  if (!sala) return;
  var src = 'https://meet.jit.si/' + encodeURIComponent(sala) +
    '#config.prejoinPageEnabled=false' +
    '&config.startWithAudioMuted=true' +
    '&config.startWithVideoMuted=true' +
    '&config.disableDeepLinking=true' +
    '&userInfo.displayName=%22Tel%C3%A3o%20-%20Entrevista%22';

  document.getElementById('call-frame').src = src;
  document.getElementById('call-wrap').classList.add('show');
  document.getElementById('espera').classList.add('oculta');
}

/* ── Encerrar a chamada e voltar pra tela de espera ── */
function ocultarEntrevista() {
  document.getElementById('call-frame').src = 'about:blank'; // libera câmera/mic do dispositivo
  document.getElementById('call-wrap').classList.remove('show');
  document.getElementById('espera').classList.remove('oculta');
}

/* ── Tecla F — fullscreen · Esc — encerrar ── */
document.addEventListener('keydown', function(e) {
  if (e.key === 'f' || e.key === 'F') {
    if (!document.fullscreenElement)
      document.documentElement.requestFullscreen().catch(function(){});
  }
  if (e.key === 'Escape') ocultarEntrevista();
});
</script>
</body>
</html>
